name: Publish JS to npm

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    defaults:
      run:
        working-directory: js
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VER=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$VER" ]; then
            echo "Tag $TAG does not match package.json version $VER"
            exit 1
          fi

      - name: Parity check
        working-directory: ${{ github.workspace }}
        run: |
          python3 -m pip install --user pyyaml
          python3 scripts/parity_check.py

      - name: Install + build
        # Drop the lockfile to dodge npm's platform-specific optional-deps bug
        # (rollup's native binaries) — see https://github.com/npm/cli/issues/4828
        run: |
          rm -f package-lock.json
          npm install
          npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
